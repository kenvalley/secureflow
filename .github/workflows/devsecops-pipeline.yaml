name: Secureflow Pipeline

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:

  # -----------------------------
  # GITLEAKS
  # -----------------------------
  gitleaks-scan:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks (DO NOT FAIL PIPELINE)
        run: |
          mkdir -p reports/gitleaks

          docker run --rm \
            -v ${{ github.workspace }}:/repo \
            ghcr.io/gitleaks/gitleaks:latest \
            detect \
            --source="/repo" \
            --log-opts="--all" \
            --config="/repo/.gitleaks.toml" \
            --report-format=json \
            --report-path="/repo/reports/gitleaks/gitleaks-report.json" || true

      - name: Upload Gitleaks
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: reports/gitleaks/gitleaks-report.json

# -----------------------------
# SONAR
# -----------------------------
  sonarcloud-scan:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Run SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.sources=.

      - name: Export Sonar issues
        run: |
          mkdir -p reports/sonar
          curl -s -u "${{ secrets.SONAR_TOKEN }}:" \
            "https://sonarcloud.io/api/issues/search?componentKeys=${{ secrets.SONAR_PROJECT_KEY }}&ps=500" \
            -o reports/sonar/sonar-report.json

      - name: Upload Sonar
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-reports
          path: reports/sonar/sonar-report.json

# -----------------------------
# TRIVY IMAGE
# -----------------------------
  trivy-scan:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy Image Scan
        run: |
          mkdir -p reports/trivy
          trivy image \
            --severity CRITICAL,HIGH \
            --format json \
            -o reports/trivy/trivy-report.json \
            python:3.9-slim

      - name: Upload Trivy
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: reports/trivy/trivy-report.json

# -----------------------------
# TRIVY K8s
# -----------------------------
  trivy-k8s-scan:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan K8s
        run: |
          mkdir -p reports/trivy-k8s
          trivy config \
            --severity CRITICAL,HIGH \
            --format json \
            -o reports/trivy-k8s/trivy-k8s-report.json \
            infra/kubernetes/

      - name: Upload K8s
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-k8s-report
          path: reports/trivy-k8s/trivy-k8s-report.json

  # -----------------------------
  # CHECKOV
  # -----------------------------
  checkov-scan:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov (DO NOT FAIL PIPELINE)
        run: |
          mkdir -p reports/checkov

          checkov -d infra/terraform/ \
            --framework terraform \
            --output json \
            --output-file-path reports/checkov/checkov-report.json || true

      - name: Upload Checkov
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-report
          path: reports/checkov/checkov-report.json


  # -----------------------------
  # SECURITY GATE
  # -----------------------------
  security-gate:
    runs-on: ubuntu-latest
    needs:
      - gitleaks-scan
      - sonarcloud-scan
      - trivy-scan
      - trivy-k8s-scan
      - checkov-scan
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # 🔥 This downloads ALL artifacts with correct structure
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Run Security Gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          chmod +x pipeline/scripts/security-gate.sh
          bash pipeline/scripts/security-gate.sh