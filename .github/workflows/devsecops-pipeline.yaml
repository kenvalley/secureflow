name: Secureflow Pipeline

on:
  workflow_dispatch:
  push:
  pull_request:
  issue_comment:
    types: [created]

jobs:

  # -----------------------------
  # GITLEAKS
  # -----------------------------
  gitleaks-scan:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Run Gitleaks (current files only)
        run: |
          mkdir -p reports/gitleaks
          docker run --rm \
            -v ${{ github.workspace }}:/repo \
            ghcr.io/gitleaks/gitleaks:latest \
            detect \
            --source="/repo" \
            --config="/repo/.gitleaks.toml" \
            --report-format=json \
            --report-path="/repo/reports/gitleaks/gitleaks-report.json" || true

      # - name: Run Gitleaks (DO NOT FAIL PIPELINE)
      #   run: |
      #     mkdir -p reports/gitleaks

      #     docker run --rm \
      #       -v ${{ github.workspace }}:/repo \
      #       ghcr.io/gitleaks/gitleaks:latest \
      #       detect \
      #       --source="/repo" \
      #       --config="/repo/.gitleaks.toml" \
      #       --report-format=json \
      #       --report-path="/repo/reports/gitleaks/gitleaks-report.json" || true

      - name: Upload Gitleaks
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: reports/gitleaks/gitleaks-report.json

# -----------------------------
# SONAR
# -----------------------------
  sonarcloud-scan:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Run SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.sources=.

      - name: Export Sonar issues
        run: |
          mkdir -p reports/sonar
          curl -s -u "${{ secrets.SONAR_TOKEN }}:" \
            "https://sonarcloud.io/api/issues/search?componentKeys=${{ secrets.SONAR_PROJECT_KEY }}&ps=500" \
            -o reports/sonar/sonar-report.json

      - name: Upload Sonar
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-reports
          path: reports/sonar/sonar-report.json

