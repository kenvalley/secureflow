name: Secureflow Pipeline

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  hello-world:
    name: Hello World
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Hello, world!"

  gitleaks-scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks (with custom rules)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/repo \
            ghcr.io/gitleaks/gitleaks:latest \
            detect \
            --source="/repo" \
            --log-opts="--all" \
            --config="/repo/.gitleaks.toml" \
            --report-format=json \
            --report-path="/repo/gitleaks-report.json"

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json

  sonarcloud-scan:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    # needs: gitleaks-scan # Uncomment if you want to run SonarCloud only if Gitleaks passes

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=.

      # Give SonarCloud time to process results
      - name: Wait for SonarCloud processing
        run: sleep 10

      # Get ALL issues (for reports)
      - name: Export Sonar issues (JSON)
        run: |
          curl -s -u "${{ secrets.SONAR_TOKEN }}:" \
            "https://sonarcloud.io/api/issues/search?componentKeys=${{ secrets.SONAR_PROJECT_KEY }}&ps=500" \
            -o sonar-report.json

      # Convert to CSV
      - name: Convert Sonar JSON to CSV
        run: |
          jq -r '
            ["key","rule","severity","component","line","message"],
            (.issues[] | [
              .key,
              .rule,
              .severity,
              .component,
              (.line // ""),
              .message
            ])
            | @csv
          ' sonar-report.json > sonar-report.csv

      # Upload artifacts BEFORE failing
      - name: Upload Sonar reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-reports
          path: |
            sonar-report.json
            sonar-report.csv

      # Now check severity (LAST step)
      - name: Enforce CRITICAL/BLOCKER gate
        run: |
          COUNT=$(jq '[.issues[] | select(.severity=="CRITICAL" or .severity=="BLOCKER")] | length' sonar-report.json)

          echo "Critical/Blocker issues: $COUNT"

          if [ "$COUNT" -gt 0 ]; then
            echo "❌ Failing pipeline due to CRITICAL/BLOCKER issues"
            exit 1
          else
            echo "✅ No CRITICAL/BLOCKER issues"
          fi

  trivy-scan:
    name: Trivy Image Scan
    runs-on: ubuntu-latest

    steps:
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy scan
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --format json \
            -o trivy-report.json \
            python:3.9-slim

      - name: Enforce Trivy gate
        run: |
          COUNT=$(jq '[.Results[].Vulnerabilities[] | select(.Severity=="CRITICAL" or .Severity=="HIGH")] | length' trivy-report.json)

          echo "High/Critical vulnerabilities: $COUNT"

          if [ "$COUNT" -gt 0 ]; then
            echo "❌ Failing pipeline due to HIGH/CRITICAL vulnerabilities"
            exit 1
          else
            echo "✅ No HIGH/CRITICAL vulnerabilities"
          fi


  trivy-k8s-scan:
    name: Trivy Kubernetes Manifests Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan Kubernetes manifests
        run: |
          trivy config \
            --severity CRITICAL,HIGH \
            --format json \
            -o trivy-k8s-report.json \
            infra/kubernetes/

      - name: Upload K8s report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-k8s-report
          path: trivy-k8s-report.json

      - name: Enforce K8s security gate
        run: |
          COUNT=$(jq '[.Results[].Misconfigurations[]? | select(.Severity=="CRITICAL" or .Severity=="HIGH")] | length' trivy-k8s-report.json)

          echo "K8s High/Critical misconfigurations: $COUNT"

          if [ "$COUNT" -gt 0 ]; then
            echo "❌ Failing pipeline due to Kubernetes misconfigurations"
            exit 1
          else
            echo "✅ Kubernetes manifests clean"
          fi