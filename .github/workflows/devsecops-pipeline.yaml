# -----------------------------
# TRIVY IMAGE
# -----------------------------
  trivy-scan:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | \
            sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Build service images
        run: |
          docker build -t secureflow/auth-service:latest ./services/auth-service
          docker build -t secureflow/transaction-service:latest ./services/transaction-service
          docker build -t secureflow/frontend:latest ./services/frontend

      - name: Scan auth-service
        run: |
          mkdir -p reports/trivy
          trivy image \
            --severity CRITICAL,HIGH \
            --ignorefile .trivyignore \
            --format json \
            -o reports/trivy/trivy-auth-service.json \
            secureflow/auth-service:latest

      - name: Scan transaction-service
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --ignorefile .trivyignore \
            --format json \
            -o reports/trivy/trivy-transaction-service.json \
            secureflow/transaction-service:latest

      - name: Scan frontend
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --ignorefile .trivyignore \
            --format json \
            -o reports/trivy/trivy-frontend.json \
            secureflow/frontend:latest

      - name: Merge reports
        run: |
          # Combine all three into one report for the security gate
          jq -s '{
            SchemaVersion: .[0].SchemaVersion,
            Results: [.[].Results[]?]
          }' \
            reports/trivy/trivy-auth-service.json \
            reports/trivy/trivy-transaction-service.json \
            reports/trivy/trivy-frontend.json \
            > reports/trivy/trivy-report.json

      - name: Upload Trivy
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: reports/trivy/trivy-report.json
# -----------------------------
# TRIVY K8s
# -----------------------------
  trivy-k8s-scan:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan K8s
        run: |
          mkdir -p reports/trivy-k8s
          trivy config \
            --severity CRITICAL,HIGH \
            --format json \
            -o reports/trivy-k8s/trivy-k8s-report.json \
            infra/kubernetes/

      - name: Upload K8s
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-k8s-report
          path: reports/trivy-k8s/trivy-k8s-report.json




  # -----------------------------
  # CHECKOV
  # -----------------------------
  checkov-scan:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/terraform/
          framework: terraform
          output_format: json
          output_file_path: reports/checkov/
          soft_fail: true
          check: CRITICAL

      - name: Rename report to match expected filename
        if: always()
        run: |
          mkdir -p reports/checkov
          if [ -f reports/checkov/results_json.json ]; then
            mv reports/checkov/results_json.json reports/checkov/checkov-report.json
          fi

      - name: Upload Checkov
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-report
          path: reports/checkov/checkov-report.json

        

  # -----------------------------
  # SECURITY GATE
  # -----------------------------
  security-gate:
    runs-on: ubuntu-latest
    needs:
      - gitleaks-scan
      - sonarcloud-scan
      - trivy-scan
      - trivy-k8s-scan
      - checkov-scan
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # This downloads ALL artifacts with correct structure
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: reports

      # For PRs, we need to fetch labels to determine if it's security-sensitive
      - name: Fetch PR labels
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          mkdir -p reports
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels" \
            -o reports/pr-labels.json

      - name: Run Security Gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          chmod +x pipeline/scripts/security-gate.sh
          bash pipeline/scripts/security-gate.sh


  security-exception:
    name: Security Exception Handler
    runs-on: ubuntu-latest

    # if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '/security-exception')
    if: ${{ github.event_name == 'issue_comment' && contains(github.event.comment.body, '/security-exception') }}

    steps:
      - name: Extract exception data
        id: extract
        run: |
          COMMENT="${{ github.event.comment.body }}"

          echo "Comment: $COMMENT"

          REASON=$(echo "$COMMENT" | grep -oP 'reason="\K[^"]+')
          EXPIRES=$(echo "$COMMENT" | grep -oP 'expires="\K[^"]+')

          echo "reason=$REASON" >> $GITHUB_OUTPUT
          echo "expires=$EXPIRES" >> $GITHUB_OUTPUT

      - name: Validate input
        run: |
          if [ -z "${{ steps.extract.outputs.reason }}" ]; then
            echo "❌ Missing reason"
            exit 1
          fi

          if [ -z "${{ steps.extract.outputs.expires }}" ]; then
            echo "❌ Missing expiry"
            exit 1
          fi

      - name: Create exception record
        run: |
          mkdir -p exception

          cat <<EOF > exception/security-exception.json
          {
            "requested_by": "${{ github.actor }}",
            "reason": "${{ steps.extract.outputs.reason }}",
            "expires": "${{ steps.extract.outputs.expires }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Upload exception artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-exception
          path: exception/security-exception.json

      - name: Acknowledge in PR
        run: |
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -X POST \
            -d '{"body": "📝 Security exception request recorded. Awaiting AppSec review."}' \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments"

      - name: Add exception label
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"labels":["security-exception-requested"]}' \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/labels"

