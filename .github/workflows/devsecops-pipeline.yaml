name: Secureflow Pipeline

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  hello-world:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Hello, world!"

  # -----------------------------
  # GITLEAKS
  # -----------------------------
  gitleaks-scan:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/repo \
            ghcr.io/gitleaks/gitleaks:latest \
            detect \
            --source="/repo" \
            --log-opts="--all" \
            --config="/repo/.gitleaks.toml" \
            --report-format=json \
            --report-path="/repo/gitleaks-report.json"

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json

  # -----------------------------
  # SONAR
  # -----------------------------
  sonarcloud-scan:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=.

      - name: Wait for processing
        run: sleep 10

      - name: Export Sonar issues
        run: |
          curl -s -u "${{ secrets.SONAR_TOKEN }}:" \
            "https://sonarcloud.io/api/issues/search?componentKeys=${{ secrets.SONAR_PROJECT_KEY }}&ps=500" \
            -o sonar-report.json

      - name: Upload Sonar report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-reports
          path: sonar-report.json

  # -----------------------------
  # TRIVY IMAGE
  # -----------------------------
  trivy-scan:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy image scan
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --format json \
            -o trivy-report.json \
            python:3.9-slim

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

  # -----------------------------
  # TRIVY K8s
  # -----------------------------
  trivy-k8s-scan:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan Kubernetes manifests
        run: |
          trivy config \
            --severity CRITICAL,HIGH \
            --format json \
            -o trivy-k8s-report.json \
            infra/kubernetes/

      - name: Upload K8s report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-k8s-report
          path: trivy-k8s-report.json

  # -----------------------------
  # CHECKOV
  # -----------------------------
  checkov-scan:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Checkov
        run: pip install checkov

      # - name: Run Checkov
      #   run: |
      #     checkov -d infra/terraform/ \
      #       --framework terraform \
      #       --output json \
      #       --output-file-path checkov-report.json
            
      - name: Run Checkov on Terraform
        run: |
          checkov -d infra/terraform/ \
            --framework terraform \
            --output json \
            --output-file-path reports/checkov/checkov-report.json

      - name: Upload Checkov report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-report
          path: checkov-report.json

  # -----------------------------
  # SECURITY GATE
  # -----------------------------
  security-gate:
    runs-on: ubuntu-latest
    needs:
      - gitleaks-scan
      - sonarcloud-scan
      - trivy-scan
      - trivy-k8s-scan
      - checkov-scan
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Download Gitleaks
        uses: actions/download-artifact@v4
        with:
          name: gitleaks-report
          path: reports/gitleaks

      - name: Download Sonar
        uses: actions/download-artifact@v4
        with:
          name: sonar-reports
          path: reports/sonar

      - name: Download Trivy
        uses: actions/download-artifact@v4
        with:
          name: trivy-report
          path: reports/trivy

      - name: Download Trivy K8s
        uses: actions/download-artifact@v4
        with:
          name: trivy-k8s-report
          path: reports/trivy-k8s

      - name: Download Checkov
        uses: actions/download-artifact@v4
        with:
          name: checkov-report
          path: reports/checkov

      - name: Run Security Gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          chmod +x pipeline/scripts/security-gate.sh
          bash pipeline/scripts/security-gate.sh