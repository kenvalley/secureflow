title = "SecureFlow Gitleaks Config"

[allowlist]
  description = "Allowlist for intentional vulnerabilities and false positives"

  paths = [
    # Scan report archives — contain secrets found in previous scans
    '''evidence''',
    '''reports''',
    '''trivy-report\.json''',
    '''gitleaks-report\.json''',

    # Intentionally vulnerable app documentation
    '''VULNERABILITIES\.md''',

    # Intentional Terraform vulnerability IV-01
    '''infra/terraform/main\.tf''',
  ]

  regexes = [
    # Vault Agent template placeholders — not real secrets
    '''DB_PASSWORD=\{\{.*\.Data\.data''',
    '''JWT_SECRET=\{\{.*\.Data\.data''',
    '''SESSION_SECRET=\{\{.*\.Data\.data''',

    # docker-compose variable substitution — value comes from .env file
    '''(DB_PASSWORD|POSTGRES_PASSWORD):\s+\$\{''',

    # Kubernetes configMapKeyRef key names — variable references, not values
    '''key:\s+(AUTH_DB_PASSWORD|TX_DB_PASSWORD)''',

    # GitHub Actions secret references — not real credentials
    '''\$\{\{\s*secrets\.\w+\s*\}\}''',

    # Flask token variable assignment — not a secret value
    '''token\s*=\s*auth_header''',

    # Python GPG_KEY in image metadata — not an API key
    '''GPG_KEY=E3FF2839C048B25C084DEBE9B26995E3''',

    # SonarCloud issue keys — not API keys
    '''key":"AZ3i''',
  ]