# New version of auth-service.yaml with Vault Agent Injector annotations and env vars

apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: secureflow
spec:
  replicas: 1
  selector:
    matchLabels:
      svc: auth-service
  template:
    metadata:
      labels:
        svc: auth-service
      annotations:
        # --- Vault Agent Injector annotations ---
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "auth-service-role"
        vault.hashicorp.com/agent-inject-secret-config: "secureflow/data/auth-service"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secureflow/data/auth-service" -}}
          DB_HOST={{ .Data.data.db_host }}
          DB_PORT={{ .Data.data.db_port }}
          DB_NAME={{ .Data.data.db_name }}
          DB_USER={{ .Data.data.db_user }}
          DB_PASSWORD={{ .Data.data.db_password }}
          JWT_SECRET={{ .Data.data.jwt_secret }}
          {{- end }}

    spec:
      serviceAccountName: auth-service-sa
      # Pod-level security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000                    # vault secrets volume readable by app user
      containers:
        - name: auth-service
          image: secureflow/auth-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5001
          # Container-level security context
          securityContext:
            privileged: false                        # CK-04 fix
            allowPrivilegeEscalation: false          # CK-04 fix
            readOnlyRootFilesystem: true             # extra hardening
            capabilities:
              drop:
                - ALL                                # drop every Linux capability
          resources:                                 # CK-05 fix
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: secureflow
spec:
  selector:
    svc: auth-service
  ports:
    - port: 5001
      targetPort: 5001






















