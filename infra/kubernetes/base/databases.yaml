            - name: POSTGRES_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: secureflow-config
                  key: TX_DB_PASSWORD
          ports:
            - containerPort: 5432
          securityContext:
            readOnlyRootFilesystem: false   # postgres needs to write to disk
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              memory: "128Mi"
