# SecureFlow custom Falco rules
# Designed to detect the intentional vulnerabilities and attack patterns
# present in the SecureFlow deliberately vulnerable application


- rule: Shell Spawned in SecureFlow Container
  desc: >
    A shell process was spawned inside a SecureFlow container.
    This may indicate an attacker using kubectl exec or a
    reverse shell from an exploited vulnerability.
  condition: >
    spawned_process
    and container
    and container.image.repository contains "secureflow"
    and (proc.name in (shell_binaries)
         or proc.name = "id"
         or proc.name = "whoami"
         or proc.name = "sh"
         or proc.name = "bash"
         or proc.name = "dash")
  output: >
    Shell spawned in SecureFlow container
    (user=%user.name user_uid=%user.uid
    container=%container.name
    image=%container.image.repository
    shell=%proc.name parent=%proc.pname
    cmdline=%proc.cmdline)
  priority: WARNING
  tags: [secureflow, shell, T1059]

- rule: Sensitive File Read in SecureFlow Container
  desc: >
    A process inside a SecureFlow container attempted to read
    a sensitive system file such as /etc/shadow or /etc/passwd.
  condition: >
    open_read
    and container
    and container.image.repository contains "secureflow"
    and (fd.name = "/etc/shadow"
         or fd.name = "/etc/passwd"
         or fd.name = "/etc/sudoers"
         or fd.name glob "/etc/ssh/*"
         or fd.name glob "/root/.ssh/*")
  output: >
    Sensitive file read in SecureFlow container
    (user=%user.name
    container=%container.name
    image=%container.image.repository
    file=%fd.name
    cmdline=%proc.cmdline)
  priority: CRITICAL
  tags: [secureflow, sensitive-file, T1083]

- rule: Package Manager Executed in SecureFlow Container
  desc: >
    A package manager was executed inside a SecureFlow container.
    This may indicate an attacker installing tools post-exploitation.
  condition: >
    spawned_process
    and container
    and container.image.repository contains "secureflow"
    and proc.name in (package_mgmt_binaries)
  output: >
    Package manager executed in SecureFlow container
    (user=%user.name
    container=%container.name
    image=%container.image.repository
    command=%proc.cmdline)
  priority: ERROR
  tags: [secureflow, package-manager, T1072]

- rule: Unexpected Outbound Connection from SecureFlow Container
  desc: >
    A SecureFlow container established an outbound network connection.
    Monitors for potential reverse shells or data exfiltration.
  condition: >
    outbound
    and container
    and container.image.repository contains "secureflow"
    and not fd.sport in (53, 443, 80, 5001, 5002, 5432, 8200)
    and not proc.name in ("python3", "vault-agent", "vault")
  output: >
    Outbound connection from SecureFlow container
    (user=%user.name
    container=%container.name
    image=%container.image.repository
    connection=%fd.name
    sport=%fd.sport
    cmdline=%proc.cmdline)
  priority: WARNING
  tags: [secureflow, network, T1071]


- rule: Vault Secrets Accessed by Unexpected Process
  desc: >
    A process other than the expected application accessed
    the Vault secrets file. May indicate credential theft.
  condition: >
    open_read
    and container
    and container.image.repository contains "secureflow"
    and fd.name startswith "/vault/secrets/"
    and not proc.name in ("python3", "vault", "sh")
  output: >
    Vault secrets accessed by unexpected process
    (user=%user.name
    container=%container.name
    proc=%proc.name
    file=%fd.name
    cmdline=%proc.cmdline)
  priority: CRITICAL
  tags: [secureflow, vault, T1552]
















